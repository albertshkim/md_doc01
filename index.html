<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ MD Vault — 마크다운 뷰어</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   THEME VARIABLES & BASE (기존 스타일 유지)
═══════════════════════════════════════ */
:root, [data-theme="dark"] {
  --bg-base: #080c14; --bg-panel: #0d1320; --bg-card: #111827; --bg-hover: #1a2340;
  --border: #1e2d50; --border-bright: #2a3f6f; --accent: #e94560; --accent-dim: rgba(233,69,96,0.15);
  --accent2: #7b8cde; --accent3: #5fb7d4; --text-primary: #e8edf8; --text-secondary: #a8b2d8;
  --text-muted: #5a6585; --code-bg: #0a0f1a; --code-color: #e6edf3; --shadow: 0 8px 40px rgba(0,0,0,0.6);
  --header-bg: rgba(8,12,20,0.92); --noise-color1: rgba(233,69,96,0.06); --noise-color2: rgba(123,140,222,0.05);
  --grid-line: rgba(255,255,255,0.012); --blockquote-bg: rgba(233,69,96,0.10); --inline-code-bg: rgba(123,140,222,0.12);
  --inline-code-cl: #e94560; --img-border: #1e2d50; --table-row-hover:#1a2340; --toc-item-hover: #1a2340;
  --pw-modal-bg: #0d1320; --info-card-bg: #111827;
}

[data-theme="light"] {
  --bg-base: #f4f6fb; --bg-panel: #ffffff; --bg-card: #f0f4fc; --bg-hover: #e8edf8;
  --border: #d0d9ee; --border-bright: #b0bedd; --accent: #d63051; --accent-dim: rgba(214,48,81,0.10);
  --accent2: #4a5fcf; --accent3: #1a8fa8; --text-primary: #0f1a2e; --text-secondary: #334166;
  --text-muted: #8294b8; --code-bg: #edf0f8; --code-color: #1e2d50; --shadow: 0 8px 40px rgba(0,0,0,0.12);
  --header-bg: rgba(255,255,255,0.94); --noise-color1: rgba(214,48,81,0.04); --noise-color2: rgba(74,95,207,0.04);
  --grid-line: rgba(0,0,0,0.03); --blockquote-bg: rgba(214,48,81,0.06); --inline-code-bg: rgba(74,95,207,0.10);
  --inline-code-cl: #d63051; --img-border: #d0d9ee; --table-row-hover:#e8edf8; --toc-item-hover: #e8edf8;
  --pw-modal-bg: #ffffff; --info-card-bg: #f0f4fc;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg-base); color: var(--text-primary); min-height: 100vh; transition: all 0.3s; }

/* ═══════════════════════════════════════
   LAYOUT & HEADER
═══════════════════════════════════════ */
header {
  position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 60px; background: var(--header-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
}
.header-actions { display: flex; align-items: center; gap: 8px; }

.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 7px 15px; border-radius: 8px; border: none;
  cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; white-space: nowrap;
}
.btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--accent3); }
.btn-primary { background: var(--accent); color: #fff; }

/* TOAST MESSAGE STYLE */
#toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: var(--bg-panel); color: var(--text-primary); padding: 12px 24px;
  border-radius: 50px; border: 1px solid var(--accent); z-index: 9999;
  font-size: 14px; box-shadow: var(--shadow); opacity: 0; pointer-events: none;
  transition: opacity 0.3s, bottom 0.3s;
}
#toast.show { opacity: 1; bottom: 40px; }

/* 간단한 메인 레이아웃 (데모용) */
.app-layout { display: grid; grid-template-columns: 260px 1fr; height: calc(100vh - 60px); }
aside { background: var(--bg-panel); border-right: 1px solid var(--border); padding: 20px; }
main { padding: 40px; overflow-y: auto; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-text">✦ MD <span>Vault</span></div>
  </div>
  
  <div class="header-actions">
    <button class="btn btn-ghost" id="btn-share">
      <span>🔗</span>
      <span>공유하기</span>
    </button>
    <button class="btn btn-primary">글쓰기</button>
  </div>
</header>

<div class="app-layout">
  <aside>
    <div style="font-size: 12px; color: var(--text-muted);">SIDEBAR CONTENT</div>
  </aside>
  <main>
    <div class="doc-content visible">
      <h1 class="doc-meta-title" style="margin-bottom: 20px;">공유 테스트 문서</h1>
      <p style="line-height: 1.8; color: var(--text-secondary);">
        오른쪽 상단의 공유하기 버튼을 눌러보세요.<br>
        모바일에서는 시스템 공유창이, 데스크탑에서는 URL 복사 기능이 작동합니다.
      </p>
    </div>
  </main>
</div>

<div id="toast">🔗 URL이 클립보드에 복사되었습니다.</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const shareBtn = document.getElementById('btn-share');
    const toast = document.getElementById('toast');

    // 토스트 표시 함수
    function showToast(message) {
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2500);
    }

    // 공유하기 클릭 이벤트
    shareBtn.addEventListener('click', async () => {
        const docTitle = document.querySelector('.doc-meta-title')?.textContent || "MD Vault 문서";
        const shareData = {
            title: docTitle,
            text: 'MD Vault에서 마크다운 문서를 확인해보세요!',
            url: window.location.href
        };

        try {
            // 1. Web Share API 지원 여부 확인 (최신 모바일 브라우저 등)
            if (navigator.share) {
                await navigator.share(shareData);
            } else {
                // 2. 미지원 시 (데스크탑 등) 클립보드 복사
                await navigator.clipboard.writeText(window.location.href);
                showToast('🔗 URL이 클립보드에 복사되었습니다.');
            }
        } catch (err) {
            // 사용자가 공유를 취소한 경우가 아니면 에러 표시
            if (err.name !== 'AbortError') {
                console.error('공유 실패:', err);
                showToast('❌ 공유 중 오류가 발생했습니다.');
            }
        }
    });
});
</script>

</body>
</html>
